<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Trabajador - Toori ServiciosYa</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/main.css">
    <style>
        .profile-header {
            background: linear-gradient(135deg, var(--toori-blue) 0%, #1d4ed8 100%);
            padding: 40px 0;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .review-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #f1f5f9;
        }

        .star-rating .bi-star-fill {
            color: #fbbf24;
        }
    </style>
</head>

<body class="bg-light">

    <!-- Header / Navbar Placeholder -->
    <div id="navbar-auth-container"></div>

    <div id="page-loader" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Cargando perfil...</p>
    </div>

    <div id="main-content" class="d-none">
        <header class="profile-header text-center mb-4">
            <div class="container">
                <img id="worker-foto" src="https://ui-avatars.com/api/?name=Worker" alt="Worker"
                    class="profile-avatar mb-3">
                <h2 class="fw-bold mb-1" id="worker-nombre">---</h2>
                <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
                    <div class="star-rating" id="worker-rating-display">
                        <!-- Stars injected here -->
                    </div>
                    <span class="text-white-50 small" id="worker-total-reviews">(0 reseñas)</span>
                </div>
                <div id="worker-badges" class="d-flex justify-content-center gap-2 flex-wrap mt-3">
                    <!-- Badges injected here -->
                </div>
            </div>
        </header>

        <main class="container mb-5">
            <div class="row g-4">
                <!-- Info Section -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm p-4 h-100" style="border-radius: 25px;">
                        <h5 class="fw-bold mb-4">Sobre el Trabajador</h5>
                        <div class="d-flex flex-column gap-3">
                            <div class="d-flex align-items-center gap-3">
                                <div class="bg-primary-subtle text-primary p-3 rounded-circle">
                                    <i class="bi bi-geo-alt-fill"></i>
                                </div>
                                <div>
                                    <small class="text-muted d-block">Zona de cobertura</small>
                                    <strong id="worker-zona">---</strong>
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-3">
                                <div class="bg-success-subtle text-success p-3 rounded-circle">
                                    <i class="bi bi-shield-check"></i>
                                </div>
                                <div>
                                    <small class="text-muted d-block">Estado de Verificación</small>
                                    <strong id="worker-verificado">Pendiente</strong>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4 text-muted opacity-25">

                        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm" id="btn-contratar">
                            Solicitar Servicio Ahora
                        </button>
                    </div>
                </div>

                <!-- Reviews Section -->
                <div class="col-lg-8">
                    <h5 class="fw-bold mb-4 d-flex align-items-center gap-2">
                        <i class="bi bi-chat-left-text-fill text-primary"></i>
                        Reseñas de Clientes
                    </h5>

                    <div id="reviews-list">
                        <!-- Reviews injected here -->
                    </div>

                    <div id="empty-reviews" class="text-center py-5 bg-white rounded-4 border d-none">
                        <p class="text-muted mb-0">Este trabajador aún no tiene reseñas verificadas.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/utils/navbar.ts"></script>
    <script type="module" src="/src/perfil-trabajador.ts"></script>
</body>

</html>
