<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cliente - Toori ServiciosYa</title>
    <meta name="description"
        content="Registrate en Toori para solicitar servicios profesionales con respaldo total para tu hogar.">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logo.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/src/styles/main.css">
    <style>
        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .form-control {
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
        }

        .form-control:focus {
            background-color: white;
            border-color: var(--toori-blue);
            box-shadow: 0 0 0 4px rgba(0, 194, 203, 0.1);
        }

        .btn-auth {
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            background: var(--toori-blue);
            color: white;
            border: none;
            transition: all 0.2s;
        }

        .btn-auth:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 576px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="text-center mb-4">
            <a href="/">
                <img src="assets/logo.png" alt="Toori Logo" style="height: 180px;">
            </a>
        </div>

        <div class="auth-card">
            <div class="text-center mb-4">
                <h4 class="fw-bold" style="color: var(--toori-dark);">Registrate como Cliente</h4>
                <p class="text-muted small">Contratá servicios de emergencia de forma segura.</p>
            </div>

            <div id="reg-cliente-alert" class="alert d-none" role="alert"></div>

            <form id="form-cliente">
                <div class="grid">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">Nombre</label>
                        <input type="text" id="cli-nombre" class="form-control" placeholder="Ej: Roberto" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">Apellido</label>
                        <input type="text" id="cli-apellido" class="form-control" placeholder="Ej: Gómez" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted fw-bold small">WhatsApp (Sin 0 ni 15)</label>
                    <input type="tel" id="cli-telefono" class="form-control" placeholder="Ej: 1123456789" required
                        autocomplete="tel">
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted fw-bold small">Correo Electrónico</label>
                    <input type="email" id="cli-email" class="form-control" placeholder="tu@correo.com" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted fw-bold small">Contraseña</label>
                    <input type="password" id="cli-password" class="form-control" placeholder="Mínimo 6 caracteres"
                        required minlength="6">
                </div>

                <button type="submit" id="btn-submit-cli" class="btn-auth">
                    Crear Cuenta y Continuar
                </button>

                <div class="text-center mt-4">
                    <p class="text-muted small mb-1">¿Ya tienes cuenta?</p>
                    <a href="/login.html" class="text-decoration-none fw-bold" style="color: var(--toori-blue);">
                        Iniciar Sesión
                    </a>
                </div>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none" style="color: var(--toori-purple); font-weight: 600;"><i
                    class="bi bi-arrow-left"></i> Volver al inicio</a>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/registro-cliente.ts"></script>
</body>

</html>
