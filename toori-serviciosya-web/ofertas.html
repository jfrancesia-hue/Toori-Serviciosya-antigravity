<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas de Trabajo - Toori ServiciosYa</title>
    <link rel="stylesheet" href="/src/styles/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body style="background-color: var(--bg-soft); min-height: 100vh;">

    <!-- Navbar -->
    <header class="navbar navbar--sticky">
        <div class="container-header">
            <a href="/" class="logo" style="margin-right: auto;">
                <img src="/assets/logo.png" alt="Toori Logo">
                <span>Toori ServiciosYa</span>
            </a>
            <nav class="nav-menu">
                <a href="/" class="nav-link"
                    style="background: rgba(var(--toori-blue-rgb), 0.1); padding: 8px 20px; border-radius: 50px; color: var(--toori-blue);">Inicio</a>
                <a href="/ofertas.html" class="nav-link">Ofertas</a>
                <a href="/registro.html" class="nav-link">Soy Trabajador</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 0 100px;">
        <div class="mb-4">
            <h1>Ofertas Disponibles</h1>
            <p class="text-muted">Encontrá oportunidades y enviá tu presupuesto hoy mismo.</p>
        </div>

        <div id="loading-ofertas" class="text-center py-5">
            <div style="font-size: 2rem; color: var(--toori-blue);"><i class="bi bi-arrow-repeat spin"></i></div>
            <p class="mt-2 text-muted">Buscando las mejores ofertas para vos...</p>
        </div>

        <div id="ofertas-container" class="grid"
            style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 32px;">
            <!-- Rendered by src/ofertas.ts -->
        </div>
    </main>

    <!-- Footer -->
    <footer style="padding: 60px 0 40px; background: white; border-top: 1px solid #f0f0f0;">
        <div class="container text-center">
            <div class="logo logo--footer justify-center mb-3" style="font-size: 1.1rem;">
                <img src="/assets/logo.png" alt="Toori Logo">
                <span>Toori ServiciosYa</span>
            </div>
            <p class="text-muted" style="font-size: 0.8rem;">© 2024 Toori ServiciosYa. Todos los derechos reservados.
            </p>
        </div>
    </footer>

    <style>
        .justify-center {
            justify-content: center;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
            display: inline-block;
        }
    </style>

    <script type="module" src="/src/ofertas.ts"></script>
    <script type="module" src="/src/utils/navbar.ts"></script>
</body>

</html>
